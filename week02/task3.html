<!DOCTYPE html>
<html>
<head>
<style>
  .named    { color: red; }
  .hex      { color: #ff6600; }
  .rgb      { color: rgb(0, 128, 255); }
  .rgba     { color: rgba(0, 128, 0, 0.5); }
  .hsl      { color: hsl(240, 100%, 50%); }
</style>
</head>
<body>
  <p class="named">Named color</p>
  <p class="hex">Hex color</p>
  <p class="rgb">RGB color</p>
  <p class="rgba">RGBA color</p>
  <p class="hsl">HSL color</p>
</body>
</html>
