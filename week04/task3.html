<!DOCTYPE html>
<html>
<body>
<script>
  // for loop
  for (let i = 1; i <= 10; i++) {
    document.write(i + " ")
  }

  document.write("<br>")

  // while loop
  let i = 1
  while (i <= 10) {
    document.write(i + " ")
    i++
  }

  document.write("<br>")

  // do-while loop
  let j = 1
  do {
    document.write(j + " ")
    j++
  } while (j <= 10)
</script>
</body>
</html>
