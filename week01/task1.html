<!DOCTYPE html>
<html>
<body>

  <h3>Ordered List</h3>
  <ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ol>

  <h3>Unordered List</h3>
  <ul>
    <li>MongoDB</li>
    <li>Express</li>
    <li>React</li>
  </ul>

  <h3>Nested List</h3>
  <ul>
    <li>Frontend
      <ul>
        <li>HTML</li>
        <li>CSS</li>
      </ul>
    </li>
    <li>Backend
      <ol>
        <li>Node</li>
        <li>Express</li>
      </ol>
    </li>
  </ul>

  <h3>Definition List</h3>
  <dl>
    <dt>HTML</dt>
    <dd>Markup language</dd>
    <dt>CSS</dt>
    <dd>Styling language</dd>
  </dl>

</body>
</html>
